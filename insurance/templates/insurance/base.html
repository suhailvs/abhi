{% extends 'base.html' %}
{% block nav %}INSURANCE BROKING{% endblock %}
{% block body %}
<div class="container-fluid px-3 py-3">
  {% if messages %}
    {% for message in messages %}
      <div class="alert alert-{{ message.tags|default:'info' }} alert-dismissible fade show py-2" role="alert">
        {{ message }}
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
      </div>
    {% endfor %}
  {% endif %}

  {% block content %}{% endblock %}
</div>
{% endblock %}
