{% extends 'base.html' %}
{% block body %}

<div class="topbar">
  <span class="app-title">≡ 🏠 INSURANCE BROKING</span>
  <span class="breadcrumb-bar">{% block breadcrumb %}Page : Query &rsaquo; Entry Search{% endblock %}</span>
</div>

<div class="container-fluid px-3 py-3">
  {% if messages %}
    {% for message in messages %}
      <div class="alert alert-{{ message.tags|default:'info' }} alert-dismissible fade show py-2" role="alert">
        {{ message }}
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
      </div>
    {% endfor %}
  {% endif %}

  {% block content %}{% endblock %}
</div>
{% endblock %}
