<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}Finsgrow: Soft{% endblock %}</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:wght@400;700&family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --ib-navy: #1a2744;
    --ib-green: #4a7c59;
    --ib-green-light: #6aab7a;
    --ib-header-bg: #2c3e6b;
    --ib-section-bg: #6a8f6a;
    --ib-row-odd: #f5f5e8;
    --ib-row-even: #ffffff;
    --ib-border: #c8c8a0;
  }
  body { font-family: 'Roboto', sans-serif; background: #e8e8d8; font-size: 0.875rem; }

  /* Top bar */
  .topbar {
    background: var(--ib-navy);
    color: #fff;
    padding: 8px 20px;
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .topbar .app-title {
    font-family: 'Roboto Condensed', sans-serif;
    font-size: 1.4rem;
    font-weight: 700;
    letter-spacing: 1px;
  }
  .topbar .breadcrumb-bar {
    margin-left: auto;
    font-size: 0.75rem;
    color: #c8d4f0;
  }

  /* Section headers (green rows) */
  .section-header {
    background: var(--ib-section-bg);
    color: #fff;
    font-weight: 600;
    padding: 5px 10px;
    font-size: 0.82rem;
    letter-spacing: 0.3px;
  }

  /* Detail grid */
  .detail-table { width: 100%; border-collapse: collapse; }
  .detail-table td {
    padding: 5px 10px;
    border: 1px solid var(--ib-border);
    vertical-align: top;
  }
  .detail-table tr:nth-child(odd) td { background: var(--ib-row-odd); }
  .detail-table tr:nth-child(even) td { background: var(--ib-row-even); }
  .detail-table .label { color: #555; font-size: 0.78rem; white-space: nowrap; }
  .detail-table .value { font-weight: 500; color: #1a1a1a; }

  /* Card wrapper */
  .ib-card {
    background: #fff;
    border: 1px solid var(--ib-border);
    border-radius: 2px;
  }

  /* Verified badge */
  .badge-verified { color: #c00; font-size: 0.75rem; font-weight: 600; }

  /* Buttons */
  .btn-ib-primary { background: var(--ib-header-bg); color: #fff; border: none; font-size: 0.8rem; }
  .btn-ib-primary:hover { background: var(--ib-navy); color: #fff; }
  .btn-ib-view { background: #4a7c9e; color: #fff; border: none; font-size: 0.75rem; padding: 2px 10px; }

  /* Form section labels */
  .form-section-title {
    font-family: 'Roboto Condensed', sans-serif;
    font-size: 0.8rem;
    font-weight: 700;
    letter-spacing: 0.5px;
    color: #fff;
    background: var(--ib-section-bg);
    padding: 4px 10px;
    margin-bottom: 0;
  }
  .form-label { font-size: 0.78rem; color: #555; margin-bottom: 2px; }
  .form-control, .form-select { font-size: 0.82rem; border-radius: 2px; padding: 4px 8px; }
  .form-control:focus, .form-select:focus { border-color: var(--ib-header-bg); box-shadow: 0 0 0 2px rgba(44,62,107,0.15); }
</style>
</head>
<body>

<div class="topbar">
  <span class="app-title"><a href="{% url 'home' %}">🏠</a> {% block nav %}INSURANCE BROKING{% endblock %}</span>
  <span class="breadcrumb-bar">{% if user.is_authenticated %}
    <strong>{{ user.username }}</strong>
    <form method="post" style="display:inline!important;" action="{% url 'logout' %}">
        {% csrf_token %}
        <button class="btn btn-link" type="submit">logout</button>
    </form>{% endif %}</span>
</div>

{% block body %}
<div class="container-fluid px-3 py-3">
  {% if messages %}
    {% for message in messages %}
      <div class="alert alert-{{ message.tags|default:'info' }} alert-dismissible fade show py-2" role="alert">
        {{ message }}
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
      </div>
    {% endfor %}
  {% endif %}

  {% block content %}{% endblock %}
</div>
{% endblock %}
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
